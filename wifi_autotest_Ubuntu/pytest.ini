[pytest]
testpaths = tests
addopts = -ra --strict-markers --tb=short
markers =
    rf: tests that require a working RF link between BPI and DUT
    slow: tests that take > 30 seconds
    destructive: tests that reboot or reflash the DUT

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s  %(levelname)-7s  %(name)s  %(message)s
log_cli_date_format = %H:%M:%S

timeout = 120
